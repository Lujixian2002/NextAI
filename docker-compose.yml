version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: nextai-pgvector
    restart: unless-stopped
    environment:
      POSTGRES_DB: nextai
      POSTGRES_USER: nextai
      POSTGRES_PASSWORD: nextai
    ports:
      - "5432:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data

volumes:
  pgvector_data:
